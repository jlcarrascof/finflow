services:

  db:
    image: postgres:16-alpine
    container_name: finflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  api:
    build:
      context: .                        # ← CAMBIA: era ./apps/api, ahora raíz del monorepo
      dockerfile: apps/api/Dockerfile   # ← CAMBIA: ruta explícita al Dockerfile
    container_name: finflow-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  # shell:   ← comentado hasta crear apps/shell/Dockerfile
  #   build:
  #     context: ./apps/shell
  #     dockerfile: Dockerfile
  #   container_name: finflow-shell
  #   restart: unless-stopped
  #   ports:
  #     - "5000:80"
  #   depends_on:
  #     - api

volumes:
  postgres-data:
    driver: local
